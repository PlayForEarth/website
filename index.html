<style>
:root {
  --bg: #f0faf2;
  --bg2: #e8f7ed;
  --ink: #12271a;
  --ink-light: #3a5444;
  --green: #1a8c3f;
  --green-dark: #127030;
  --green-bright: #22c55e;
  --green-pale: #dcfce7;
  --earth: #d97706;
  --earth-pale: #fef3c7;
  --white: #ffffff;
  --border: rgba(26,140,63,0.15);
  --border-dark: rgba(18,39,26,0.1);
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Familjen Grotesk', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); overflow-x: hidden; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 5%;
  background: rgba(240,250,242,0.94);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
}
.nav-logo { font-family: var(--serif); font-size: 1.1rem; font-weight: 700; color: var(--ink); text-decoration: none; letter-spacing: -0.01em; }
.nav-logo em { color: var(--green); font-style: normal; }
.nav-links { display: flex; list-style: none; gap: 32px; align-items: center; }
.nav-links a { font-size: 0.875rem; font-weight: 500; color: var(--ink-light); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover { color: var(--green); }
.nav-cta { background: var(--green) !important; color: white !important; padding: 9px 20px; border-radius: 24px; font-weight: 600 !important; transition: background 0.2s !important; }
.nav-cta:hover { background: var(--green-dark) !important; }

/* ── HAMBURGER ── */
.nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 6px; z-index: 501; background: none; border: none; -webkit-tap-highlight-color: transparent; }
.nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); border-radius: 2px; transition: all 0.3s; transform-origin: center; }
.nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── MOBILE MENU ── */
.mobile-menu { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 499; padding: 96px 6% 48px; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; }
.mobile-menu.open { transform: translateX(0); }
.mobile-menu-link { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; font-family: var(--serif); font-size: 1.4rem; font-weight: 700; color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--border); }
.mobile-menu-link .arrow { color: var(--green); opacity: 0.5; }
.mobile-menu-cta { margin-top: 32px; display: block; background: var(--green); color: white; text-align: center; padding: 18px 28px; border-radius: 40px; font-size: 1rem; font-weight: 700; text-decoration: none; }

/* ── HERO ── */
.hero {
  min-height: 92vh; display: flex; flex-direction: column; justify-content: flex-end;
  padding: 120px 5% 80px; position: relative; overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 70% 30%, rgba(34,197,94,0.16) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 15% 75%, rgba(250,204,21,0.12) 0%, transparent 50%),
    var(--bg);
}
.hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(26,140,63,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(26,140,63,0.04) 1px, transparent 1px); background-size: 56px 56px; }
.hero > * { position: relative; z-index: 2; }

.hero-eyebrow { display: inline-flex; align-items: center; gap: 10px; background: var(--green-pale); border: 1px solid rgba(34,197,94,0.3); color: var(--green); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 14px; border-radius: 24px; width: fit-content; margin-bottom: 24px; }

.hero h1 { font-family: var(--serif); font-size: clamp(2.6rem, 4.5vw, 4.2rem); font-weight: 900; line-height: 1.07; letter-spacing: -0.03em; max-width: 680px; margin-bottom: 20px; color: var(--ink); }
.hero h1 em { font-style: italic; color: var(--green); }
.hero-sub { font-size: 1.1rem; line-height: 1.75; color: var(--ink-light); max-width: 560px; margin-bottom: 36px; }
.hero-actions { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 56px; }

.btn-primary { background: var(--green); color: white; padding: 14px 32px; border-radius: 32px; font-size: 0.95rem; font-weight: 700; text-decoration: none; transition: all 0.2s; box-shadow: 0 4px 20px rgba(26,140,63,0.3); display: inline-block; }
.btn-primary:hover { background: var(--green-dark); transform: translateY(-2px); }
.btn-ghost { color: var(--ink-light); font-size: 0.9rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 7px; transition: color 0.2s; }
.btn-ghost:hover { color: var(--green); }

/* Hero proof bar (3-up cards bottom) */
.hero-proof { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 680px; }
.proof-card { background: rgba(255,255,255,0.85); border: 1px solid rgba(26,140,63,0.14); border-radius: 14px; padding: 20px 18px; backdrop-filter: blur(6px); }
.proof-card-label { font-size: 0.67rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green); margin-bottom: 5px; }
.proof-card-title { font-size: 0.9rem; font-weight: 700; color: var(--ink); line-height: 1.3; margin-bottom: 4px; }
.proof-card-desc { font-size: 0.77rem; color: var(--ink-light); line-height: 1.5; }

/* Hero video — floats right on desktop */
.hero-video {
  position: absolute; right: 5%; top: 50%; transform: translateY(-50%);
  z-index: 2; width: min(460px, 38vw);
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(18,39,26,0.2);
  border: 3px solid white;
  background: #0d2d0d;
  aspect-ratio: 16/9;
}
.hero-video video { width: 100%; height: 100%; object-fit: cover; display: block; }
.hero-video-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  background: linear-gradient(135deg, #0d2d0d 0%, #1a5c1a 100%);
  color: rgba(255,255,255,0.55); font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase;
}
.hero-video-placeholder .play-btn { width: 52px; height: 52px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.35); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: rgba(255,255,255,0.7); }

/* ── LOGOS STRIP ── */
.logos-strip { background: white; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 28px 5%; }
.logos-inner { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; justify-content: center; }
.logos-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(18,39,26,0.32); }
.logo-item { font-family: var(--serif); font-size: 1.05rem; font-weight: 700; color: rgba(18,39,26,0.5); }
.logo-item sup { font-size: 0.6rem; font-family: var(--sans); color: var(--green); vertical-align: super; margin-left: 2px; font-weight: 700; }

/* ── SECTION COMMON ── */
section { padding: 100px 5%; }
.section-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: var(--green-pale); border: 1px solid rgba(34,197,94,0.25); color: var(--green); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 14px; border-radius: 20px; margin-bottom: 16px; }
.section-title { font-family: var(--serif); font-size: clamp(2rem, 3.6vw, 3rem); font-weight: 900; line-height: 1.1; letter-spacing: -0.025em; margin-bottom: 20px; color: var(--ink); }
.section-title em { font-style: italic; color: var(--green); }
.section-sub { font-size: 1.05rem; color: var(--ink-light); line-height: 1.7; max-width: 540px; }

/* ── WHO IT'S FOR ── */

.who-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 56px; }

}
.who-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(18,39,26,0.09); border-color: rgba(26,140,63,0.3); }
.who-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--green); }
.who-icon { font-size: 2.4rem; margin-bottom: 14px; display: block; }

/* BIGGER role label */
.who-role {
  font-size: 0.82rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--green); margin-bottom: 10px;
}
/* BIGGER h3 */
.who-card h3 {
  font-family: var(--serif); font-size: 1.4rem; font-weight: 900;
  color: var(--ink); margin-bottom: 10px; line-height: 1.2;
}
.who-card p { font-size: 0.86rem; color: var(--ink-light); line-height: 1.65; margin-bottom: 16px; }

/* icon bullet instead of arrow */

/* ── HOW IT WORKS ── */

/* Full-width steps — removed the split layout confusion */
.how-steps-full { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; margin-top: 56px; border: 1px solid var(--border-dark); border-radius: 16px; overflow: hidden; background: white; box-shadow: 0 4px 20px rgba(18,39,26,0.06); }
